<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #333; margin-top: 0; }
        p { font-size: 16px; color: #555; line-height: 1.6; }
        strong { color: #007bff; }
        .error-card { background: #ffebee; border-left: 5px solid #f44336; padding: 20px; max-width: 400px; margin: auto; border-radius: 4px; }
        .error-title { color: #c62828; font-weight: bold; font-size: 20px; margin-top: 0; }
    </style>
</head>
<body>

    {% if student %}
        <div class="card">
            <h1>Student Profile</h1>
            <p><strong>ID:</strong> {{ student.id }}</p>
            <p><strong>Name:</strong> {{ student.name }}</p>
            <p><strong>Course:</strong> {{ student.course }}</p>
            <p><strong>Email:</strong> {{ student.email }}</p>
        </div>
    {% else %}
        <div class="error-card">
            <p class="error-title">Oops! Student Not Found</p>
            <p>The student with the requested ID does not exist in our system.</p>
        </div>
    {% endif %}

</body>
</html>
